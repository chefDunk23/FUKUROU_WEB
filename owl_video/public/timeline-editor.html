<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIフクロウ博士 タイムラインエディタ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }
  header { background: #1e293b; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 700; }
  header span { font-size: 13px; color: #94a3b8; }
  .container { max-width: 900px; margin: 24px auto; padding: 0 16px 80px; }

  /* cards */
  .card { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  .card h2 { font-size: 14px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }

  /* grid */
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .row label { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .row label span { font-size: 12px; font-weight: 600; color: #64748b; }
  input[type=text], input[type=date], select {
    padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; width: 100%; transition: border-color .15s;
  }
  input:focus, select:focus { outline: none; border-color: #6366f1; }

  /* race section */
  .race-section { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .race-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .race-badge { background: #1e293b; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .race-badge.main { background: #ef4444; }
  .race-name-input { flex: 1; }
  .horses-grid { display: grid; gap: 8px; }
  .horse-row { display: flex; align-items: center; gap: 8px; }
  .mark-badge { width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; flex-shrink: 0; }
  .mark-◎ { background: #fee2e2; color: #ef4444; }
  .mark-◯ { background: #e0f2fe; color: #0284c7; }
  .mark-★ { background: #fef9c3; color: #d97706; }
  .horse-row input { font-size: 14px; }
  .horse-name { flex: 2; }
  .horse-prob { flex: 1; min-width: 80px; }
  .horse-reason { flex: 3; }

  /* actions */
  .actions { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1.5px solid #e2e8f0;
    padding: 12px 24px; display: flex; gap: 12px; justify-content: flex-end; z-index: 100; }
  button { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1.5px solid #e2e8f0; }
  .btn-secondary:hover { background: #e2e8f0; }

  /* preview */
  pre { background: #0f172a; color: #7dd3fc; font-size: 12px; border-radius: 8px; padding: 16px; overflow-x: auto; max-height: 400px; white-space: pre-wrap; word-break: break-all; }
  .preview-toggle { font-size: 12px; color: #6366f1; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }

  .section-label { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
  .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .tagline-row { margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div>🦉</div>
  <div>
    <h1>AIフクロウ博士 タイムラインエディタ</h1>
    <span>CSV不要 ─ 予想データを入力してtimeline.jsonをダウンロード</span>
  </div>
</header>

<div class="container">

  <!-- 基本情報 -->
  <div class="card">
    <h2>基本情報</h2>
    <div class="row">
      <label><span>会場名</span><input type="text" id="venue" value="中山" placeholder="東京 / 中山 / 阪神 …"></label>
      <label><span>日付</span><input type="date" id="date" value=""></label>
      <label><span>メインレース名（intro・outro文に使用）</span><input type="text" id="main_race_name" value="皐月賞" placeholder="天皇賞（春）など"></label>
    </div>
  </div>

  <!-- 9R -->
  <div class="card">
    <h2>クイックレース</h2>

    <div class="race-section" id="sec-9R">
      <div class="race-header">
        <span class="race-badge">9R</span>
        <input type="text" class="race-name-input" id="rname-9R" placeholder="レース名（例: 野島崎特別）">
      </div>
      <div class="section-label">◎/◯/★ 上位3頭（勝率の高い順）</div>
      <div class="horses-grid" id="horses-9R"></div>
      <div class="row tagline-row">
        <label style="flex:1"><span>キャッチコピー (race_tagline)</span>
          <input type="text" id="tagline-9R" placeholder="例: 穴馬注目！波乱期待レース">
        </label>
      </div>
    </div>

    <div class="race-section" id="sec-10R">
      <div class="race-header">
        <span class="race-badge">10R</span>
        <input type="text" class="race-name-input" id="rname-10R" placeholder="レース名">
      </div>
      <div class="section-label">◎/◯/★ 上位3頭</div>
      <div class="horses-grid" id="horses-10R"></div>
      <div class="row tagline-row">
        <label style="flex:1"><span>キャッチコピー</span>
          <input type="text" id="tagline-10R" placeholder="">
        </label>
      </div>
    </div>

    <div class="race-section" id="sec-12R">
      <div class="race-header">
        <span class="race-badge">12R</span>
        <input type="text" class="race-name-input" id="rname-12R" placeholder="レース名">
      </div>
      <div class="section-label">◎/◯/★ 上位3頭</div>
      <div class="horses-grid" id="horses-12R"></div>
      <div class="row tagline-row">
        <label style="flex:1"><span>キャッチコピー</span>
          <input type="text" id="tagline-12R" placeholder="">
        </label>
      </div>
    </div>
  </div>

  <!-- 11R メイン -->
  <div class="card">
    <h2>★ メインレース（11R）</h2>
    <div class="race-section" id="sec-11R">
      <div class="race-header">
        <span class="race-badge main">11R MAIN</span>
        <input type="text" class="race-name-input" id="rname-11R" placeholder="レース名（例: 皐月賞）">
      </div>
      <div class="section-label">◎/◯/★ 上位3頭</div>
      <div class="horses-grid" id="horses-11R"></div>
      <div class="row tagline-row">
        <label style="flex:1"><span>AI専門家コメント (specialist_reason)</span>
          <input type="text" id="specialist" placeholder="例: 展開AIが直近バイアス：先行馬消耗パターンを検知">
        </label>
      </div>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="card">
    <h2>JSON プレビュー</h2>
    <span class="preview-toggle" onclick="togglePreview()">▶ 表示 / 非表示</span>
    <div id="preview-area" style="display:none; margin-top:12px;">
      <pre id="json-preview">（まだ生成されていません）</pre>
    </div>
    <p class="hint" style="margin-top:8px;">※ ダウンロードしたJSONをRemotionの --props に渡して動画を生成してください。</p>
  </div>

</div>

<!-- bottom actions -->
<div class="actions">
  <button class="btn-secondary" onclick="loadTemplate()">📋 サンプルを読み込む</button>
  <button class="btn-primary" onclick="generateAndDownload()">⬇ timeline.json をダウンロード</button>
</div>

<script>
const MARKS = ["◎", "◯", "★"];
const RACES = ["9R", "10R", "12R", "11R"];

// 馬行を生成
function buildHorseRows(raceId) {
  const container = document.getElementById(`horses-${raceId}`);
  MARKS.forEach(mark => {
    const row = document.createElement("div");
    row.className = "horse-row";
    row.innerHTML = `
      <div class="mark-badge mark-${mark}">${mark}</div>
      <input type="text" class="horse-name" id="name-${raceId}-${mark}" placeholder="馬名">
      <input type="text" class="horse-prob" id="prob-${raceId}-${mark}" placeholder="21.2%">
      <input type="text" class="horse-reason" id="reason-${raceId}-${mark}" placeholder="理由（騎手複勝率 / 長距離適性◎ など）">
    `;
    container.appendChild(row);
  });
}
RACES.forEach(buildHorseRows);

// 今日の日付をセット
document.getElementById("date").value = new Date().toISOString().slice(0, 10);

// ---------------------------------------------------------------------------
// JSON 生成ロジック
// ---------------------------------------------------------------------------
function getVal(id) { return (document.getElementById(id)?.value ?? "").trim(); }

function getHorses(raceId) {
  return MARKS.map(mark => ({
    mark,
    name: getVal(`name-${raceId}-${mark}`),
    reason: getVal(`reason-${raceId}-${mark}`),
    win_prob: getVal(`prob-${raceId}-${mark}`),
  })).filter(h => h.name !== "");
}

function buildSpeechIntro(venue, mainName) {
  return `今週の${venue}競馬場、後半戦のAI結論じゃ！${mainName}は最後に見せるホゥ！`;
}
function buildDisplayIntro(mainName) {
  return `9R〜12Rの予想をサクッと紹介！\n🔥 注目の${mainName}は最後に登場！🔥`;
}
function buildSpeechQuick(raceNum, horses) {
  const parts = horses.map(h => `${h.mark}${h.name}`).join("、");
  return `${raceNum}は${parts}でいくぞ！`;
}
function buildDisplayQuick(raceNum, raceName, horses) {
  const marks = horses.map(h => `${h.mark}${h.name}`).join("  ");
  return `${raceNum}　${raceName}\n${marks}`;
}
function buildSpeechMain(horses, specialist) {
  const top = horses[0];
  const ana = horses.find(h => h.mark === "★");
  let speech = `お待ちかねのメイン、${getVal("rname-11R")}じゃ！`;
  if (top) speech += `◎${top.name}は${top.reason || "AI最高評価"}！`;
  if (ana) speech += `★${ana.name}に注目じゃ！`;
  if (specialist) speech += specialist;
  return speech;
}
function buildDisplayMain(raceName, horses) {
  const marks = horses.map(h => `${h.mark}${h.name}`).join("  ");
  const top = horses[0];
  return `★ MAIN　11R ${raceName}\n${marks}\n${top ? `◎${top.name}：${top.reason}` : ""}`;
}
function buildTakeaway(horses) {
  const top = horses[0];
  if (!top) return "";
  if (top.reason) return `AI結論　◎${top.name}：${top.reason.slice(0, 20)}`;
  const ana = horses.find(h => h.mark === "★");
  if (ana?.reason) return `AI注目　★${ana.name}：${ana.reason.slice(0, 20)}`;
  return `AI結論　本命◎${top.name}に注目！`;
}

function generateTimeline() {
  const venue    = getVal("venue")    || "東京";
  const dateVal  = getVal("date")     || new Date().toISOString().slice(0, 10);
  const mainName = getVal("main_race_name") || getVal("rname-11R") || "メインレース";

  const dateObj = new Date(dateVal);
  const dateDisplay = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

  const scenes = [];

  // Intro
  scenes.push({
    type: "intro",
    speech_text:  buildSpeechIntro(venue, mainName),
    display_text: buildDisplayIntro(mainName),
    audio_path: "", duration_seconds: 0,
    venue, date: dateDisplay,
  });

  // Quick races: 9R, 10R, 12R
  for (const rId of ["9R", "10R", "12R"]) {
    const raceName = getVal(`rname-${rId}`);
    const horses   = getHorses(rId);
    if (!raceName && horses.length === 0) continue;
    const tagline = getVal(`tagline-${rId}`) || "AIが自信を持つ推奨レース";
    scenes.push({
      type: "quick_race",
      race_number: rId,
      race_name: raceName,
      horses,
      speech_text:  buildSpeechQuick(rId, horses),
      display_text: buildDisplayQuick(rId, raceName, horses),
      race_tagline: tagline,
      audio_path: "", duration_seconds: 0,
    });
  }

  // Main race: 11R
  {
    const raceName   = getVal("rname-11R") || mainName;
    const horses     = getHorses("11R");
    const specialist = getVal("specialist");
    const takeaway   = buildTakeaway(horses);
    const scene = {
      type: "main_race",
      race_number: "11R",
      race_name: raceName,
      horses,
      speech_text:  buildSpeechMain(horses, specialist),
      display_text: buildDisplayMain(raceName, horses),
      audio_path: "", duration_seconds: 0,
    };
    if (specialist)  scene.specialist_reason = specialist;
    if (takeaway)    scene.display_takeaway_text = takeaway;
    scenes.push(scene);
  }

  // Outro
  scenes.push({
    type: "outro",
    speech_text:  "詳細なデータは下のリンクから本編動画で確認するホゥ！チャンネル登録もよろしく頼むぞ！",
    display_text: "詳細は本編動画・概要欄をチェック！\nチャンネル登録もよろしく！",
    audio_path: "", duration_seconds: 0,
  });

  return {
    video_type: "venue_short",
    venue_name: venue,
    date: dateVal,
    scenes,
    generated_at: new Date().toISOString().slice(0, 19),
  };
}

function togglePreview() {
  const area = document.getElementById("preview-area");
  const isHidden = area.style.display === "none";
  area.style.display = isHidden ? "block" : "none";
  if (isHidden) {
    document.getElementById("json-preview").textContent =
      JSON.stringify(generateTimeline(), null, 2);
  }
}

function generateAndDownload() {
  const timeline = generateTimeline();
  const json = JSON.stringify(timeline, null, 2);
  document.getElementById("json-preview").textContent = json;
  document.getElementById("preview-area").style.display = "block";

  const venue = timeline.venue_name;
  const date  = timeline.date.replace(/-/g, "");
  const filename = `timeline_${date}_${venue}.json`;

  const blob = new Blob([json], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// サンプルデータ読み込み
function loadTemplate() {
  document.getElementById("venue").value = "東京";
  document.getElementById("date").value  = "2026-05-04";
  document.getElementById("main_race_name").value = "天皇賞（春）";

  const data = {
    "9R":  { name:"ニュージーランドT", tagline:"穴馬注目！波乱期待レース",
              horses:[{name:"カフェラテ",prob:"28.3%",reason:"末脚（上がり3F）"},
                      {name:"サクラユウヒ",prob:"22.1%",reason:"父馬の距離適性"},
                      {name:"メイケイエール",prob:"14.5%",reason:"騎手複勝率"}]},
    "10R": { name:"府中ステークス", tagline:"AI自信度: S 堅く勝負！",
              horses:[{name:"ノースブリッジ",prob:"26.8%",reason:"総合的な競走能力"},
                      {name:"ルージュエヴァイユ",prob:"19.2%",reason:"厩舎実績"},
                      {name:"ジャスパーゴールド",prob:"11.7%",reason:"血統背景"}]},
    "12R": { name:"東京1400", tagline:"本命軸で堅く決まる！",
              horses:[{name:"スピリットクラフト",prob:"31.0%",reason:"近5走の持ちタイム"},
                      {name:"アオラキ",prob:"18.5%",reason:"コース適性"}]},
    "11R": { name:"天皇賞（春）", specialist:"展開AIが直近バイアス：先行馬消耗パターンを検知。差し馬に異常値が出ておるぞ！",
              horses:[{name:"ディープボンド",prob:"24.1%",reason:"長距離適性◎ 前走完勝"},
                      {name:"タイトルホルダー",prob:"18.7%",reason:"逃げ馬 展開利あり"},
                      {name:"シルヴァーソニック",prob:"12.3%",reason:"穴候補 前走急上昇"}]},
  };

  RACES.forEach(rId => {
    const d = data[rId];
    if (!d) return;
    document.getElementById(`rname-${rId}`).value   = d.name || "";
    if (d.tagline)    document.getElementById(`tagline-${rId}`).value    = d.tagline;
    if (d.specialist) document.getElementById("specialist").value         = d.specialist;
    MARKS.forEach((mark, i) => {
      const h = d.horses?.[i];
      document.getElementById(`name-${rId}-${mark}`).value   = h?.name   || "";
      document.getElementById(`prob-${rId}-${mark}`).value   = h?.prob   || "";
      document.getElementById(`reason-${rId}-${mark}`).value = h?.reason || "";
    });
  });
}
</script>
</body>
</html>
